<!DOCTYPE html>
<!-- Dice al browser che stiamo usando HTML5 -->

<html>
    <head>

        <!-- Imposta la codifica dei caratteri -->
        <meta charset="utf-8">

        <!-- Compatibilità con Internet Explorer -->
        <meta http-equiv="X-UA-Compatible" content="IE=edge">

        <!-- Titolo della pagina mostrato nella scheda del browser -->
        <title></title>

        <!-- Descrizione della pagina -->
        <meta name="description" content="">

        <!-- Serve per rendere il sito responsive su telefono e tablet -->
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <!-- Collegamento al file CSS esterno -->
        <!-- Attenzione: probabilmente hai scritto male "style.css" -->
        <link rel="stylesheet" href="./swtyle.css">

    </head>

    <body>

        <!-- Contenitore principale -->
        <div>

            <!-- Titolo principale della pagina -->
            <!-- id serve per identificare un elemento unico -->
            <h1 id="titolo">Ciao mondo</h1>

            <!-- Paragrafo -->
            <!-- class serve per applicare stili a più elementi -->
            <p class="testo">
                Questo è un esercizio di css
            </p>

        </div>
        <!-- Una prova per far apparire e sparire un elemento  -->
        <div class="fantasma">
            <h2>
                Sono Apparso buuuuuu
            </h2>
        </div>

    </body>
</html>
