<!DOCTYPE html>
<!-- Qui ce la configurazione della lingua -->
<html lang="en">
<head>
    <!-- Qui ci sono i meta dati tra questiu ci sono coddifiche ddei caratteri -->
    <meta charset="UTF-8">
    <meta name="description" content="Esempio di pagina HTML">
    <meta name="author" content="Nome autore">
    <!-- questo e il meta dato per la configurazione dello'zoom quando la pagina viene visualizzata da altri schermi -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina con meta tag</title>
</head>
<body>
    <!-- Questo è il header -->
    <header>
        <h1>sito di esempio</h1>
    </header>
    <!-- Quersto è la navbar dove mettiano tutti i link per la navigazione della pagina  -->
    <nav>
        <a href="#">home</a>
        <a href="#">Contatti</a>
    </nav>
    <!-- La sezione main chge e la sezione di mezzo tra footer e header -->
    <main>
        <!-- La section divide in sezione il foglio di html -->
        <section>
            <h2>sezione principale</h2>
            <p>contenuto della sezione</p>
        </section>
        <!-- La tabella e le due parti  -->
        <table>
            <!-- Questa e la parte sopra il header della tabella -->
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Età</th>
                    <th>Ruolo</th>
                </tr>
            </thead>
            <!-- Qui inizia il corpo della tabella -->
            <tbody>
                <tr>
                    <td>mario</td>
                    <td>25</td>
                    <td>Studente</td>
                </tr>
                <tr>
                    <td>Laura</td>
                    <td>30</td>
                    <td>Docente</td>
                </tr>
            </tbody>
        </table>
        <!-- qui abbiamo il tag articler che serve a sewrarare un articolo al resto del documento  -->
        <article>
            <h2>Articolo</h2>
            <p>Testo di un contenuto indipendente</p>
        </article>
    </main>
    <!-- Qui ce il footer la parter finale dfella pagina  -->
    <footer>
        <p>copyright 2026</p>
    </footer>
</body>
</html>
