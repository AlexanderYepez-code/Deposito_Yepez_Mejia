<!DOCTYPE html>
<html lang="en">

<head>
    <title>Esempi</title>
</head>

<body>
    <form action="">
        <!-- questo è in input select che fi sciegliere i corsi  -->
        <label for="corso">Scegli un corso:</label>
        <select name="corso" name="corso">
            <option value="html">HTML</option>
            <option value="css">CSS</option>
            <option value="js">JavaScript</option>
        </select>
        <!-- Questo sono i checkbox -->
        <p>Seleziona le tecnologie conosciute:</p>
        <input type="checkbox" id="html" name="tecnologie" value="html">
        <label for="html">HTML</label>

        <input type="checkbox" id="css" name="tecnologie" value="css">
        <label for="css">CSS</label>

        <input type="checkbox" id="js" name="tecnologie" value="js">
        <label for="js">JavaScript</label>
    </form>


</body>

</html>
